services:

  zookeeper:
    image: zookeeper:3.9
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper

  api-service:
    build: ./api-service
    ports:
      - "3000:3000"
    depends_on:
      - kafka

  order-service:
    build: ./order-service
    ports:
      - "3001:3001"
    depends_on:
      - kafka

  notification-service:
    build: ./notification-service
    ports:
      - "3002:3002"
    depends_on:
      - kafka

  analytics-service:
    build: ./analytics-service
    ports:
      - "3003:3003"
    depends_on:
      - kafka
