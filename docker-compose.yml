services:

  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:latest
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper

  api-service:
    build: ./api-service
    ports:
      - "3000:3000"
    depends_on:
      - kafka

  order-service:
    build: ./order-service
    ports:
      - "3001:3001"
    depends_on:
      - kafka

  notification-service:
    build: ./notification-service
    ports:
      - "3002:3002"
    depends_on:
      - kafka

  analytics-service:
    build: ./analytics-service
    ports:
      - "3003:3003"
    depends_on:
      - kafka
